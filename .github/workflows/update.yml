name: Actualización mensual DVRP

on:
  schedule:
    - cron: "0 0 1 * *"  # cada mes, día 1 a medianoche
  workflow_dispatch:      # ejecución manual opcional

jobs:
  update-openalex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script de actualización
        run: python scripts/openalex_update.py

      - name: Subir base de datos como artifact
        uses: actions/upload-artifact@v4
        with:
          name: articulos_db
          path: db/articulos_dvrp.db

      - name: Subir CSV como artifact
        uses: actions/upload-artifact@v4
        with:
          name: articulos_csv
          path: articulos.csv

